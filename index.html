<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한글 타자 게임</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:#0f172a; color:#fff;
  font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif;
  overflow:hidden;
}

/* ── 전체 레이아웃: 고정 픽셀, 뷰포트 조작 없음 ── */
#app {
  display:flex; flex-direction:column;
  width:100%;
  background:#0f172a;
  /* height는 JS가 한 번만 계산해서 고정 */
}

/* HUD */
#hud {
  flex-shrink:0;
  display:flex; justify-content:space-around; align-items:center;
  background:#1e293b; border-bottom:2px solid #334155;
  padding:8px 0;
}
.hb { text-align:center; }
.hl { font-size:10px; color:#64748b; }
.hv { font-size:20px; font-weight:900; color:#34d399; }
#hv-lives { color:#f87171; }
#hv-level { color:#fbbf24; }

/* 게임 영역: 고정 높이 (JS로 한 번 계산) */
#ga {
  position:relative; overflow:hidden;
  background:#0a0f1e;
  flex-shrink:0;
  /* height: JS 설정 */
}

#ground {
  position:absolute; left:0; right:0; bottom:0;
  height:3px; background:#ef4444;
  box-shadow:0 0 12px #ef4444;
}

/* 입력창: 일반 블록 (position:fixed/absolute 없음) */
#iw {
  flex-shrink:0;
  background:#1e293b;
  border-top:2px solid #3b82f6;
  padding:8px 14px 10px;
}
#size-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
#size-label { font-size:11px; color:#64748b; white-space:nowrap; }
#size-slider {
  flex:1; -webkit-appearance:none; appearance:none;
  height:6px; border-radius:3px;
  background:linear-gradient(to right,#34d399 0%,#34d399 var(--pct,50%),#334155 var(--pct,50%),#334155 100%);
  outline:none;
}
#size-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:20px; height:20px; border-radius:50%; background:#34d399;
}
#size-val { font-size:12px; color:#34d399; font-weight:700; min-width:48px; text-align:right; }
#inp {
  display:block; width:100%; height:46px;
  font-size:22px; font-weight:900; font-family:inherit;
  color:#34d399; background:#0a0f1e;
  border:2px solid #3b82f6; border-radius:12px;
  padding:0 14px; outline:none; caret-color:#34d399;
}
#inp:focus { border-color:#34d399; box-shadow:0 0 0 3px rgba(52,211,153,.2); }
#inp::placeholder { color:#334155; font-size:13px; font-weight:400; }

/* 단어 */
.wb { position:absolute; top:0; display:flex; gap:3px; pointer-events:none; user-select:none; }
.sy { display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; background:#1e3a8a; border:2px solid #3b82f6; border-radius:8px; }
.sy.ok { background:#064e3b; border-color:#34d399; color:#6ee7b7; }
@keyframes pop { 0%{transform:scale(1);opacity:1} 40%{transform:scale(2.4);opacity:.8} 100%{transform:scale(0);opacity:0} }
.wb.pop { animation:pop .32s cubic-bezier(.36,.07,.19,.97) forwards; }

#flash { position:absolute; inset:0; pointer-events:none; z-index:300; opacity:0; }
#flash.hit   { background:rgba(52,211,153,.18); }
#flash.miss  { background:rgba(239,68,68,.24); }
#flash.combo { background:rgba(251,191,36,.16); }
#flash.on    { opacity:1; transition:none; }
#flash.off   { opacity:0; transition:opacity .12s; }

#combo { position:absolute; top:8px; left:50%; transform:translateX(-50%); font-size:15px; font-weight:900; color:#fbbf24; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; z-index:15; }
#combo.on { opacity:1; }
#lvbadge { position:absolute; top:8px; right:10px; font-size:10px; color:#475569; font-weight:700; pointer-events:none; z-index:15; }

.pt { position:absolute; border-radius:50%; pointer-events:none; animation:pf .65s ease-out forwards; }
@keyframes pf { from{opacity:1;transform:translate(0,0) scale(1)} to{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }
.ring { position:absolute; border-radius:50%; border:3px solid var(--rc,#34d399); pointer-events:none; animation:rf .38s ease-out forwards; transform:translate(-50%,-50%) scale(0); }
@keyframes rf { from{opacity:.9;transform:translate(-50%,-50%) scale(0)} to{opacity:0;transform:translate(-50%,-50%) scale(1)} }
.sc-pop { position:absolute; font-weight:900; pointer-events:none; z-index:50; white-space:nowrap; transform:translateX(-50%); animation:scpop .72s ease-out forwards; }
@keyframes scpop { 0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.9)} 20%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.15)} 100%{opacity:0;transform:translateX(-50%) translateY(-62px) scale(1)} }
.lv { position:absolute; top:38%; left:50%; transform:translate(-50%,-50%); font-size:28px; font-weight:900; color:#fbbf24; pointer-events:none; z-index:80; animation:lvt 1s ease forwards; white-space:nowrap; }
@keyframes lvt { 0%{opacity:0;transform:translate(-50%,-50%) scale(.4)} 30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 70%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
.shake { animation:shake .32s ease; }

#ov { position:absolute; inset:0; background:rgba(0,0,0,.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; z-index:200; }
#ov.off { display:none; }
#ov-title { font-size:clamp(30px,10vw,52px); font-weight:900; color:#34d399; text-align:center; }
#ov-sub { font-size:13px; color:#94a3b8; text-align:center; }
#ov-sc { background:#1e293b; border:1px solid #334155; border-radius:14px; padding:12px 22px; width:100%; max-width:280px; display:none; }
.sr { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
.sr span:last-child { color:#34d399; font-weight:700; }
#btn { width:100%; max-width:260px; height:52px; font-size:20px; font-weight:900; font-family:inherit; color:#0f172a; background:#34d399; border:none; border-radius:14px; cursor:pointer; }
#btn:active { opacity:.85; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hb"><div class="hl">점수</div><div class="hv" id="hv-score">0</div></div>
    <div class="hb"><div class="hl">목숨</div><div class="hv" id="hv-lives">♥♥♥</div></div>
    <div class="hb"><div class="hl">레벨</div><div class="hv" id="hv-level">1</div></div>
  </div>
  <div id="ga">
    <div id="flash"></div>
    <div id="combo"></div>
    <div id="lvbadge"></div>
    <div id="ground"></div>
    <div id="ov">
      <div id="ov-title">한글 타자</div>
      <div id="ov-sub">떨어지는 단어를 받아치세요!</div>
      <div id="ov-sc">
        <div class="sr"><span>최종 점수</span><span id="fs">0</span></div>
        <div class="sr"><span>최고 레벨</span><span id="fl">1</span></div>
        <div class="sr"><span>최대 콤보</span><span id="fc">0</span></div>
      </div>
      <button id="btn">게임 시작</button>
    </div>
  </div>
  <div id="iw">
    <div id="size-row">
      <span id="size-label">글씨 크기</span>
      <input id="size-slider" type="range" min="1" max="5" value="3" step="1">
      <span id="size-val">보통</span>
    </div>
    <input id="inp" type="text" inputmode="text"
      placeholder="탭 → 한글 입력 (완성 시 자동 터짐)"
      autocomplete="off" autocorrect="off"
      autocapitalize="none" spellcheck="false">
  </div>
</div>

<script>
// ── 레이아웃: 한 번만 계산, 이후 변경 없음 ──────────────────

const gaH = Math.max(200, window.innerHeight - KB_H - HUD_H - IW_H - MARGIN);
document.getElementById('ga').style.height = gaH + 'px';

// ── 단어 풀 ──────────────────────────────────────────────────

const W_LV5=['가는말이고와야오는말이곱다','세살버릇여든까지간다','원숭이도나무에서떨어진다','티끌모아태산','백지장도맞들면낫다','하늘은스스로돕는자를돕는다','오늘하루도수고했어요','내일은더잘할수있어','포기하지말고끝까지해봐','대한민국화이팅','모두함께힘을내자','같이가면멀리간다','봄이오면꽃이피고','여름에는강가에서수영하고','가을이면단풍구경가고','겨울에는눈썰매타자','청출어람청어람','형설지공','주경야독','결초보은','일석이조','새옹지마','오비이락','독서는마음의양식','건강이최고다','웃음이보약이다','한글은세계최고의문자다','세종대왕이만드신한글','자랑스러운우리문화유산'];

// ── 오디오 ──────────────────────────────────────────────────
let actx=null;
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
function playHit(c){const ctx=getCtx(),t=ctx.currentTime,f=440+Math.min(c,12)*30;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='triangle';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*.35,t+.1);g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.16);o.start(t);o.stop(t+.18);const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.04),ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)**3;const s=ctx.createBufferSource(),g2=ctx.createGain();s.buffer=buf;s.connect(g2);g2.connect(ctx.destination);g2.gain.setValueAtTime(.22,t);s.start(t);}
function playCombo(n){const ctx=getCtx(),t=ctx.currentTime;(n>=8?[523,659,784,1047]:n>=5?[523,659,784]:[523,659]).forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;const st=t+i*.07;g.gain.setValueAtTime(.16,st);g.gain.exponentialRampToValueAtTime(.001,st+.26);o.start(st);o.stop(st+.28);});}

const flashEl=document.getElementById('flash');let flashTmr=null;
function doFlash(type){clearTimeout(flashTmr);flashEl.className=type+' on';flashTmr=setTimeout(()=>{flashEl.className=type+' off';},60);}
function vib(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

// ── 글씨 크기 ────────────────────────────────────────────────
const SIZE_STEPS=[[24,14,'아주 작게'],[30,18,'작게'],[38,22,'보통'],[46,28,'크게'],[56,34,'아주 크게']];
let sylSize=SIZE_STEPS[2];
function applySize(step){sylSize=SIZE_STEPS[step-1];const[box,fs]=sylSize;document.documentElement.style.setProperty('--sy-box',box+'px');document.documentElement.style.setProperty('--sy-fs',fs+'px');slider.style.setProperty('--pct',((step-1)/4*100).toFixed(0)+'%');document.getElementById('size-val').textContent=SIZE_STEPS[step-1][2];}
const styleTag=document.createElement('style');styleTag.textContent='.sy{width:var(--sy-box,38px);height:var(--sy-box,38px);font-size:var(--sy-fs,22px);}';document.head.appendChild(styleTag);
const slider=document.getElementById('size-slider');
slider.addEventListener('input',function(){applySize(parseInt(this.value));});
applySize(3);

// ── 게임 ────────────────────────────────────────────────────
const SPEED=[0.7,1.0,1.4,1.9,2.5,3.2];
const IVLS=[2800,2400,2000,1650,1300,1000];
const THRESH=[0,120,300,550,900,1400];
const ga=document.getElementById('ga');
let score,lives,level,combo,maxCombo,running,words,uid,spawnTmr,rafId;
function init(){score=0;lives=3;level=1;combo=0;maxCombo=0;running=false;words=[];uid=0;spawnTmr=null;rafId=null;}
init();
function calcLevel(){let l=1;for(let i=THRESH.length-1;i>=0;i--){if(score>=THRESH[i]){l=i+1;break;}}return Math.min(l,6);}

function spawn(){if(!running)return;const pool=getPool(level),word=pool[Math.floor(Math.random()*pool.length)];const chars=[...word],box=sylSize[0],bw=chars.length*(box+3);const x=4+Math.random()*Math.max(0,ga.clientWidth-bw-8);const el=document.createElement('div');el.className='wb';el.style.left=x+'px';chars.forEach(ch=>{const s=document.createElement('div');s.className='sy';s.textContent=ch;el.appendChild(s);});ga.appendChild(el);words.push({id:uid++,el,word,y:-(box+10)});}
function tick(){if(!running)return;const H=ga.clientHeight;const spd=SPEED[level-1]||0.7,box=sylSize[0],dead=[];words.forEach(w=>{w.y+=spd;w.el.style.transform=`translateY(${w.y}px)`;if(w.y+box>=H)dead.push(w);});dead.forEach(w=>{kill(w,false);miss();});rafId=requestAnimationFrame(tick);}
function kill(w,ok){const i=words.indexOf(w);if(i>=0)words.splice(i,1);if(ok){w.el.classList.add('pop');setTimeout(()=>w.el.remove(),360);}else w.el.remove();}
function miss(){combo=0;lives=Math.max(0,lives-1);playMiss();doFlash('miss');vib([50,20,50]);hud();refreshCombo();ga.classList.remove('shake');void ga.offsetWidth;ga.classList.add('shake');setTimeout(()=>ga.classList.remove('shake'),340);if(lives<=0)over();}

const inp=document.getElementById('inp');
inp.addEventListener('input',function(){const v=this.value;highlight(v);checkMatch(v);});
function highlight(typed){words.forEach(w=>{const syls=w.el.querySelectorAll('.sy'),wc=[...w.word];let m=0;for(let i=0;i<Math.min(typed.length,wc.length);i++){if(typed[i]===wc[i])m++;else break;}syls.forEach((s,i)=>i<m?s.classList.add('ok'):s.classList.remove('ok'));});}
function checkMatch(typed){if(!typed||!running)return;let hit=null;words.forEach(w=>{if(w.word===typed&&(!hit||w.y>hit.y))hit=w;});if(hit){onHit(hit);inp.value='';highlight('');}}
function onHit(w){combo++;maxCombo=Math.max(maxCombo,combo);const base=level<=2?10:level<=4?16:level<=5?24:36;const bon=1+Math.floor(combo/3)*.5;const gained=Math.round(base*[...w.word].length*bon);score+=gained;if(combo>=3)playCombo(combo);else playHit(combo);doFlash(combo>=3?'combo':'hit');vib(combo>=5?[8,4,8,4,8]:combo>=3?[8,4,8]:[6]);burst(w.el,combo);scorePopup(w.el,gained,combo);kill(w,true);const prev=level;level=calcLevel();if(level>prev){playLvUp();lvUp();}hud();refreshCombo();}

function burst(el,combo){const ar=ga.getBoundingClientRect(),r=el.getBoundingClientRect();const cx=r.left+r.width/2-ar.left,cy=r.top+r.height/2-ar.top;const C=['#34d399','#f87171','#fbbf24','#a78bfa','#60a5fa','#fb923c'];const rc=combo>=5?'#a78bfa':combo>=3?'#fbbf24':'#34d399',cnt=combo>=5?18:combo>=3?12:8;const ring=document.createElement('div');ring.className='ring';const sz=(r.width+r.height)*2.4;ring.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;--rc:${rc};z-index:40;`;ga.appendChild(ring);setTimeout(()=>ring.remove(),420);for(let i=0;i<cnt;i++){const p=document.createElement('div');p.className='pt';const a=(i/cnt)*Math.PI*2,d=24+Math.random()*50*(combo>=3?1.5:1),sz2=3+Math.random()*6;p.style.cssText=`width:${sz2}px;height:${sz2}px;left:${cx}px;top:${cy}px;background:${C[i%C.length]};--tx:${(Math.cos(a)*d).toFixed(0)}px;--ty:${(Math.sin(a)*d).toFixed(0)}px;z-index:40;`;ga.appendChild(p);setTimeout(()=>p.remove(),700);}}
function scorePopup(el,pts,combo){const ar=ga.getBoundingClientRect(),r=el.getBoundingClientRect();const sp=document.createElement('div');sp.className='sc-pop';sp.textContent=combo>=3?`+${pts} 🔥`:`+${pts}`;const clr=combo>=5?'#a78bfa':combo>=3?'#fbbf24':'#34d399',fs=combo>=5?'20px':combo>=3?'17px':'14px';sp.style.cssText=`left:${r.left+r.width/2-ar.left}px;top:${r.top-ar.top}px;font-size:${fs};color:${clr};`;ga.appendChild(sp);setTimeout(()=>sp.remove(),750);}
function hud(){document.getElementById('hv-score').textContent=score;document.getElementById('hv-level').textContent=level;document.getElementById('hv-lives').textContent='♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));document.getElementById('lvbadge').textContent=LV_LABELS[level]||'';}
let cTmr=null;
function refreshCombo(){const el=document.getElementById('combo');clearTimeout(cTmr);if(combo>=3){el.textContent=`🔥 ${combo}콤보!`;el.classList.add('on');cTmr=setTimeout(()=>el.classList.remove('on'),1500);}else el.classList.remove('on');}
function lvUp(){const t=document.createElement('div');t.className='lv';t.textContent=`LEVEL ${level} · ${LV_LABELS[level]}`;ga.appendChild(t);setTimeout(()=>t.remove(),1100);clearInterval(spawnTmr);spawnTmr=setInterval(spawn,IVLS[level-1]||2800);}
function start(){getCtx();init();running=true;ga.querySelectorAll('.wb').forEach(el=>el.remove());document.getElementById('ov').classList.add('off');inp.value='';hud();refreshCombo();setTimeout(()=>inp.focus(),80);spawn();spawnTmr=setInterval(spawn,IVLS[0]);rafId=requestAnimationFrame(tick);}
function over(){running=false;clearInterval(spawnTmr);cancelAnimationFrame(rafId);document.getElementById('ov-title').textContent='게임 오버';document.getElementById('ov-sub').textContent='수고하셨어요!';document.getElementById('fs').textContent=score;document.getElementById('fl').textContent=`${level}단계 (${LV_LABELS[level]||''})`;document.getElementById('fc').textContent=maxCombo+'콤보';document.getElementById('ov-sc').style.display='block';document.getElementById('btn').textContent='다시 시작';document.getElementById('ov').classList.remove('off');}
document.getElementById('btn').addEventListener('click',start);
</script>
</body>
</html>
