<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한글 타자 게임</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#0f172a; color:#fff; font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif; overflow:hidden; }

#app { display:flex; flex-direction:column; width:100%; background:#0f172a; }

/* HUD */
#hud {
  flex-shrink:0;
  display:grid; grid-template-columns:repeat(4,1fr);
  background:#1e293b; border-bottom:2px solid #334155; padding:6px 0;
}
.hb { text-align:center; }
.hl { font-size:9px; color:#64748b; }
.hv { font-size:18px; font-weight:900; color:#34d399; }
#hv-lives { color:#f87171; }
#hv-level { color:#fbbf24; }
#hv-cpm   { color:#a78bfa; }

/* 게임 영역 */
#ga { position:relative; overflow:hidden; background:#0a0f1e; flex-shrink:0; }
#ground { position:absolute; left:0; right:0; bottom:0; height:3px; background:#ef4444; box-shadow:0 0 10px #ef4444; }

/* 단어 블록 */
.wb { position:absolute; top:0; display:flex; gap:3px; pointer-events:none; user-select:none; }
.sy { display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; background:#1e3a8a; border:2px solid #3b82f6; border-radius:7px; }
.sy.ok { background:#064e3b; border-color:#34d399; color:#6ee7b7; }
@keyframes pop { 0%{transform:scale(1);opacity:1} 40%{transform:scale(2.2);opacity:.8} 100%{transform:scale(0);opacity:0} }
.wb.pop { animation:pop .3s ease forwards; }

/* 플래시 */
#flash { position:absolute; inset:0; pointer-events:none; z-index:50; opacity:0; }
#flash.hit{background:rgba(52,211,153,.18);} #flash.miss{background:rgba(239,68,68,.24);} #flash.combo{background:rgba(251,191,36,.16);}
#flash.on{opacity:1;transition:none;} #flash.off{opacity:0;transition:opacity .12s;}

/* 콤보 */
#combo { position:absolute; top:6px; left:50%; transform:translateX(-50%); font-size:14px; font-weight:900; color:#fbbf24; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; z-index:15; }
#combo.on { opacity:1; }
#lvbadge { position:absolute; top:6px; right:8px; font-size:9px; color:#475569; font-weight:700; pointer-events:none; z-index:15; }

/* 파티클 */
.pt { position:absolute; border-radius:50%; pointer-events:none; animation:pf .6s ease-out forwards; }
@keyframes pf { from{opacity:1;transform:translate(0,0) scale(1)} to{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }
.ring { position:absolute; border-radius:50%; border:3px solid var(--rc,#34d399); pointer-events:none; animation:rf .36s ease-out forwards; transform:translate(-50%,-50%) scale(0); }
@keyframes rf { from{opacity:.9;transform:translate(-50%,-50%) scale(0)} to{opacity:0;transform:translate(-50%,-50%) scale(1)} }
.sc-pop { position:absolute; font-weight:900; pointer-events:none; z-index:50; white-space:nowrap; transform:translateX(-50%); animation:scpop .7s ease-out forwards; }
@keyframes scpop { 0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.9)} 20%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.1)} 100%{opacity:0;transform:translateX(-50%) translateY(-55px) scale(1)} }
.lv-pop { position:absolute; top:36%; left:50%; transform:translate(-50%,-50%); font-size:26px; font-weight:900; color:#fbbf24; pointer-events:none; z-index:80; animation:lvt 1s ease forwards; white-space:nowrap; }
@keyframes lvt { 0%{opacity:0;transform:translate(-50%,-50%) scale(.4)} 30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 70%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
.shake { animation:shake .3s ease; }

/* 오버레이 */
.ov { position:absolute; inset:0; background:rgba(0,0,0,.93); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px; z-index:200; overflow-y:auto; }
.ov.off { display:none; }
.ov-title { font-size:clamp(26px,8vw,44px); font-weight:900; color:#34d399; }
.ov-sub { font-size:12px; color:#94a3b8; text-align:center; }

/* 모드 선택 */
#mode-row { display:flex; gap:8px; width:100%; max-width:260px; }
.mode-btn { flex:1; height:40px; font-size:13px; font-weight:700; font-family:inherit; color:#64748b; background:#1e293b; border:2px solid #334155; border-radius:10px; cursor:pointer; }
.mode-btn.on { color:#0f172a; background:#34d399; border-color:#34d399; }
#mode-desc { font-size:11px; color:#475569; }

/* 닉네임 */
#name-inp { width:100%; max-width:260px; height:42px; font-size:15px; font-weight:700; font-family:inherit; color:#fff; background:#1e293b; border:2px solid #3b82f6; border-radius:10px; padding:0 12px; outline:none; text-align:center; }
#name-inp:focus { border-color:#34d399; }
#name-inp::placeholder { color:#475569; font-weight:400; font-size:12px; }

/* 버튼 */
.btn-g { width:100%; max-width:260px; height:46px; font-size:17px; font-weight:900; font-family:inherit; color:#0f172a; background:#34d399; border:none; border-radius:12px; cursor:pointer; flex-shrink:0; }
.btn-g:active { opacity:.85; }
.btn-s { width:100%; max-width:260px; height:36px; font-size:13px; font-weight:700; font-family:inherit; color:#64748b; background:transparent; border:1px solid #334155; border-radius:10px; cursor:pointer; flex-shrink:0; }
.btn-s:active { background:#1e293b; }

/* 결과 박스 */
#result-box { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:10px 16px; width:100%; max-width:270px; }
.rr { display:flex; justify-content:space-between; padding:4px 0; font-size:12px; border-bottom:1px solid #1e293b; }
.rr:last-child { border:none; }
.rv { font-weight:700; color:#34d399; }
.rv.hi { color:#fbbf24; }
.rv.sp { color:#a78bfa; }

/* 순위표 */
#rank-title { font-size:18px; font-weight:900; color:#fbbf24; }
#rank-list { width:100%; max-width:300px; }
.rk { display:grid; grid-template-columns:26px 1fr 56px 48px; gap:3px; align-items:center; padding:6px 8px; border-radius:8px; margin-bottom:3px; background:#1e293b; font-size:11px; }
.rk.me { background:#1e3a2e; border:1px solid #34d399; }
.rk.g0 { background:#2d2506; border:1px solid #fbbf24; }
.rk-n { font-weight:900; color:#64748b; text-align:center; }
.rk-n.c1{color:#fbbf24;}.rk-n.c2{color:#94a3b8;}.rk-n.c3{color:#b45309;}
.rk-name { font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rk-score { font-weight:900; color:#34d399; text-align:right; }
.rk-cpm { font-size:9px; color:#a78bfa; text-align:right; }
.rk-sub { font-size:9px; color:#475569; grid-column:2/-1; margin-top:-1px; }
.empty { color:#475569; font-size:12px; text-align:center; padding:16px 0; }

/* 입력창 */
#iw { flex-shrink:0; background:#1e293b; border-top:2px solid #3b82f6; padding:7px 12px 9px; }
#sz-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
#sz-lbl { font-size:10px; color:#64748b; white-space:nowrap; }
#sz-sl { flex:1; -webkit-appearance:none; appearance:none; height:5px; border-radius:3px; background:linear-gradient(to right,#34d399 0%,#34d399 var(--pct,50%),#334155 var(--pct,50%),#334155 100%); outline:none; }
#sz-sl::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%; background:#34d399; }
#sz-val { font-size:11px; color:#34d399; font-weight:700; min-width:44px; text-align:right; }
#inp-row { display:flex; gap:8px; align-items:center; }
#inp { flex:1; height:42px; font-size:20px; font-weight:900; font-family:inherit; color:#34d399; background:#0a0f1e; border:2px solid #3b82f6; border-radius:10px; padding:0 12px; outline:none; caret-color:#34d399; min-width:0; }
#inp:focus { border-color:#34d399; box-shadow:0 0 0 3px rgba(52,211,153,.2); }
#inp::placeholder { color:#334155; font-size:12px; font-weight:400; }
#sub-btn { flex-shrink:0; width:50px; height:42px; font-size:20px; font-weight:900; color:#0f172a; background:#34d399; border:none; border-radius:10px; cursor:pointer; }
#sub-btn:active { opacity:.8; transform:scale(.95); }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hb"><div class="hl">점수</div><div class="hv" id="hv-score">0</div></div>
    <div class="hb"><div class="hl">목숨</div><div class="hv" id="hv-lives">♥♥♥</div></div>
    <div class="hb"><div class="hl">레벨</div><div class="hv" id="hv-level">1</div></div>
    <div class="hb"><div class="hl">타수</div><div class="hv" id="hv-cpm">-</div></div>
  </div>

  <div id="ga">
    <div id="flash"></div>
    <div id="combo"></div>
    <div id="lvbadge"></div>
    <div id="ground"></div>

    <!-- 시작 화면 -->
    <div class="ov" id="ov-start">
      <div class="ov-title">한글 타자</div>
      <div class="ov-sub">떨어지는 단어를 받아치세요!</div>
      <input id="name-inp" type="text" maxlength="8" placeholder="닉네임 (최대 8자)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <div id="mode-row">
        <button class="mode-btn on" data-mode="word">📝 단어</button>
        <button class="mode-btn" data-mode="sentence">📖 문장</button>
      </div>
      <div id="mode-desc">짧은 단어를 빠르게 입력해요</div>
      <button class="btn-g" id="btn-start">게임 시작</button>
      <button class="btn-s" id="btn-rank">🏆 순위표</button>
    </div>

    <!-- 게임 오버 -->
    <div class="ov off" id="ov-over">
      <div class="ov-title" style="color:#f87171">게임 오버</div>
      <div id="result-box">
        <div class="rr"><span>닉네임</span><span class="rv hi" id="r-name">-</span></div>
        <div class="rr"><span>모드</span><span class="rv" id="r-mode">-</span></div>
        <div class="rr"><span>점수</span><span class="rv" id="r-score">0</span></div>
        <div class="rr"><span>타자 속도</span><span class="rv sp" id="r-cpm">-</span></div>
        <div class="rr"><span>최고 레벨</span><span class="rv" id="r-level">-</span></div>
        <div class="rr"><span>최대 콤보</span><span class="rv" id="r-combo">-</span></div>
      </div>
      <button class="btn-g" id="btn-again">다시 시작</button>
      <button class="btn-s" id="btn-torank">🏆 순위표</button>
    </div>

    <!-- 순위표 -->
    <div class="ov off" id="ov-rank">
      <div id="rank-title">🏆 순위표</div>
      <div id="rank-list"></div>
      <button class="btn-g" id="btn-back">← 돌아가기</button>
    </div>
  </div>

  <div id="iw">
    <div id="sz-row">
      <span id="sz-lbl">글씨 크기</span>
      <input id="sz-sl" type="range" min="1" max="5" value="3" step="1">
      <span id="sz-val">보통</span>
    </div>
    <div id="inp-row">
      <input id="inp" type="text" inputmode="text"
        placeholder="한글 입력 후 → 또는 엔터"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button id="sub-btn">→</button>
    </div>
  </div>
</div>

<script>
(function() { // 전체를 IIFE로 감싸서 변수 충돌 방지
'use strict';

// ── 레이아웃 계산 ─────────────────────────────────────────────
var KB_H = 310, HUD_H = 52, IW_H = 82, MARGIN = 8;
var gaH = Math.max(160, window.innerHeight - KB_H - HUD_H - IW_H - MARGIN);
var ga = document.getElementById('ga');
ga.style.height = gaH + 'px';

// ── 순위 저장 (localStorage) ──────────────────────────────────
var SCORE_KEY = 'hg-typing-v2';
function loadRanks() {
  try { var s = localStorage.getItem(SCORE_KEY); return s ? JSON.parse(s) : []; }
  catch(e) { return []; }
}
function saveRank(entry) {
  try {
    var list = loadRanks();
    list.push(entry);
    list.sort(function(a,b){ return b.score - a.score; });
    localStorage.setItem(SCORE_KEY, JSON.stringify(list.slice(0,20)));
  } catch(e) {}
}
function clearRanks() {
  try { localStorage.removeItem(SCORE_KEY); } catch(e) {}
}

// ── 순위표 렌더 ───────────────────────────────────────────────
function renderRanks(myEntry) {
  var list = loadRanks();
  var el = document.getElementById('rank-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty">아직 기록이 없어요! 첫 도전자가 되어보세요 🎮</div>';
    return;
  }
  var html = '';
  list.forEach(function(r, i) {
    var isMe = myEntry && r.ts === myEntry.ts;
    var medals = ['🥇','🥈','🥉'];
    var medal = i < 3 ? medals[i] : (i+1);
    var nCls = i===0?'c1':i===1?'c2':i===2?'c3':'';
    var cls = 'rk' + (isMe?' me':'') + (i===0?' g0':'');
    var d = new Date(r.ts).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    html += '<div class="'+cls+'">' +
      '<div class="rk-n '+nCls+'">'+medal+'</div>' +
      '<div><div class="rk-name">'+r.name+'</div><div class="rk-sub">'+d+' · '+(r.mode==='sentence'?'문장':'단어')+' · Lv.'+r.level+'</div></div>' +
      '<div class="rk-score">'+r.score.toLocaleString()+'</div>' +
      '<div class="rk-cpm">'+r.cpm+'<br>타/분</div>' +
      '</div>';
  });
  el.innerHTML = html;
}

// ── 오버레이 전환 ─────────────────────────────────────────────
function showOv(id) {
  ['ov-start','ov-over','ov-rank'].forEach(function(x) {
    document.getElementById(x).classList.toggle('off', x !== id);
  });
}

// ── 단어 풀 ───────────────────────────────────────────────────
var W1=['산','강','눈','비','달','별','꽃','새','물','불','땅','빛','힘','꿈','책','밥','집','문','손','발','귀','코','입','팔','목','봄','여름','가을','겨울','해','구름','바람','서리','이슬','닭','소','말','개','토끼','양','돼지','사슴','곰','여우','사과','귤','감','밤','파','무','콩','팥','쌀','강물','봄비','밤하늘','아침','저녁','새벽','노을','무지개'];
var W2=['고양이','강아지','다람쥐','거북이','금붕어','앵무새','독수리','호랑이','코끼리','딸기','수박','포도','복숭아','참외','망고','파인애플','블루베리','김치','된장','삼겹살','갈비탕','떡볶이','불고기','냉면','학교','교실','도서관','운동장','책상','의자','자동차','버스','지하철','기차','자전거','비행기','트럭','택시','봄날','여름밤','가을바람','겨울하늘','친구','선생님','부모님','할아버지','할머니','노래','춤','그림','영화','여행','요리','등산','수영','달리기','소나기','천둥','번개','태풍','바나나','레몬','오렌지'];
var W3=['컴퓨터','스마트폰','이어폰','노트북','태블릿','스피커','카메라','리모컨','경복궁','창덕궁','광화문','한라산','지리산','백두산','금강산','미술관','박물관','수족관','놀이공원','동물원','봄바람','여름장마','가을단풍','겨울바람','한식당','중식당','양식당','분식집','카페테리아','대한민국','서울특별시','부산광역시','인천광역시','인공지능','자율주행','빅데이터','클라우드','메타버스','증강현실','사랑해요','감사합니다','미안해요','반갑습니다','아름답다','깨끗하다','시원하다','따뜻하다','포근하다','달콤하다','해바라기','진달래꽃','개나리꽃','코스모스','무궁화꽃','자연보호','환경오염','기후변화','에너지절약'];
var W4=['인터넷뱅킹','모바일결제','스마트워치','블루투스','와이파이','한국전쟁','임진왜란','조선왕조','고려청자','훈민정음','세종대왕','이순신장군','민주주의','자본주의','사회주의','자유주의','복지국가','우주탐험','화성탐사','인공위성','상대성이론','양자역학','스마트팩토리','공유경제','플랫폼경제','디지털전환','태양광발전','국제올림픽','월드컵축구','설악산국립공원','한라산등반로','지리산둘레길','할머니손맛','어머니김치','아버지잔소리','행복한하루','즐거운여행','아름다운세상','따뜻한봄날','시원한여름밤','전통시장','맛집탐방','길거리음식','포장마차'];
var W5=['가는말이고와야오는말이곱다','세살버릇여든까지간다','원숭이도나무에서떨어진다','티끌모아태산','백지장도맞들면낫다','하늘은스스로돕는자를돕는다','오늘하루도수고했어요','내일은더잘할수있어','포기하지말고끝까지해봐','대한민국화이팅','모두함께힘을내자','같이가면멀리간다','청출어람청어람','일석이조','새옹지마','오비이락','독서는마음의양식','건강이최고다','웃음이보약이다','한글은세계최고의문자다'];
var W6=['오늘날씨가참좋네요','내일비가올것같아요','주말에같이영화볼까요','열심히공부하면꿈이이루어져요','포기하지마세요응원해요','우리나라대한민국만세','한글날을기념합니다','세종대왕께감사드려요','타자연습열심히해봐요','빠르고정확하게입력해봐','손가락운동이중요해요','새벽에일어나조깅했어','건강한몸에건강한마음'];

// 문장 전용
var S1=['하늘이파래요','비가내려요','꽃이피었어요','바람이불어요','눈이와요','달이밝아요','새가날아요','강이흘러요','봄이왔어요','별이빛나요'];
var S2=['오늘날씨가맑아요','아침밥을먹었어요','친구랑놀았어요','책을읽고있어요','음악을듣고있어요','저녁노을이예뻐요','고양이가잠을자요','강아지가뛰어놀아요','봄꽃이피었어요','여름바다가시원해요'];
var S3=['오늘하루도수고했어요','내일은더잘할수있어요','포기하지말고끝까지해봐요','모두함께힘을내봐요','봄이오면꽃이활짝피어요','여름에는시원한물이최고예요','가을단풍이너무아름다워요','겨울에는눈사람을만들어요','건강한몸에건강한마음이깃들어요','대한민국파이팅해봐요'];
var S4=['가는말이고와야오는말이곱다','세살버릇여든까지간다고해요','티끌모아태산이된다는말이있어요','백지장도맞들면훨씬낫다고해요','한글은세계에서가장과학적인문자예요','세종대왕이만드신한글을사랑해요','자랑스러운우리문화유산을지켜요','독서는마음의양식이라고들말해요','건강이최고라는말을항상기억해요','웃음이보약이라는말이맞는것같아요'];
var S5=['열심히공부하면꿈이반드시이루어져요','포기하지마세요항상응원하고있어요','우리나라대한민국은정말아름다운나라예요','타자연습을열심히하면속도가빨라져요','빠르고정확하게입력하는것이중요해요','스마트폰을잠시내려놓고책을읽어봐요','새벽에일어나서조깅을하면개운해요','건강한몸과건강한마음을함께가꿔봐요','오늘운동목표를달성하면기분이좋아요','작은습관이큰변화를만들어낸답니다'];

function getPool(lv, mode) {
  if (mode === 'sentence') {
    if (lv<=1) return S1.slice();
    if (lv<=2) return S1.concat(S2);
    if (lv<=3) return S2.concat(S2,S3);
    if (lv<=4) return S3.concat(S3,S4);
    if (lv<=5) return S4.concat(S4,S5);
    return S4.concat(S5,S5);
  }
  if (lv===1) return W1.slice();
  if (lv===2) return W1.concat(W1,W2);
  if (lv===3) return W1.concat(W2,W2,W3);
  if (lv===4) return W2.concat(W3,W3,W4);
  if (lv===5) return W3.concat(W4,W4,W5);
  return W4.concat(W5,W5,W6);
}

var LV_LABELS = ['','초급🌱','초중급🌿','중급⭐','중상급🔥','상급💎','최상급👑'];

// ── 오디오 ────────────────────────────────────────────────────
var actx = null;
function getCtx() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (actx && actx.state === 'suspended') { try { actx.resume(); } catch(e) {} }
  return actx;
}
function beep(freq, type, dur, vol) {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var o = ctx.createOscillator(), g = ctx.createGain(), t = ctx.currentTime;
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.01);
  } catch(e) {}
}
function playHit(c) {
  var f = 440 + Math.min(c,12)*30;
  beep(f,'triangle',0.16,0.28);
  beep(f*0.5,'sine',0.08,0.1);
}
function playCombo(n) {
  var notes = n>=8?[523,659,784,1047]:n>=5?[523,659,784]:[523,659];
  notes.forEach(function(f,i){ setTimeout(function(){ beep(f,'sine',0.22,0.14); }, i*70); });
}
function playMiss() { beep(200,'sawtooth',0.3,0.2); }
function playLvUp() { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ beep(f,'sine',0.25,0.14); }, i*100); }); }

// ── 플래시 / 햅틱 ─────────────────────────────────────────────
var flashEl = document.getElementById('flash'), flashTmr = null;
function doFlash(type) {
  clearTimeout(flashTmr);
  flashEl.className = type + ' on';
  flashTmr = setTimeout(function(){ flashEl.className = type + ' off'; }, 60);
}
function vib(p) { try { navigator.vibrate && navigator.vibrate(p); } catch(e) {} }

// ── 글씨 크기 ─────────────────────────────────────────────────
var SZ = [[22,13,'아주 작게'],[28,17,'작게'],[36,21,'보통'],[44,26,'크게'],[52,31,'아주 크게']];
var sylSize = SZ[2];
var szSl = document.getElementById('sz-sl');
var stTag = document.createElement('style');
stTag.textContent = '.sy{width:var(--sb,36px);height:var(--sb,36px);font-size:var(--sf,21px);}';
document.head.appendChild(stTag);
function applySize(step) {
  sylSize = SZ[step-1];
  var b = sylSize[0], f = sylSize[1];
  document.documentElement.style.setProperty('--sb', b+'px');
  document.documentElement.style.setProperty('--sf', f+'px');
  szSl.style.setProperty('--pct', ((step-1)/4*100).toFixed(0)+'%');
  document.getElementById('sz-val').textContent = SZ[step-1][2];
}
szSl.addEventListener('input', function(){ applySize(parseInt(this.value)); });
applySize(3);

// ── 게임 상태 ─────────────────────────────────────────────────
var SPEED   = [0.7, 1.0, 1.4, 1.9, 2.5, 3.2];
var IVLS    = [2800,2400,2000,1650,1300,1000];
var IVLS_S  = [4500,3800,3200,2700,2200,1800];
var THRESH  = [0, 120, 300, 550, 900, 1400];

var score, lives, level, combo, maxCombo, running, words, uid, spawnTmr, rafId;
var playerName = '익명';
var gameMode = 'word';
var lastEntry = null;
var typingStart = 0, totalKeys = 0, prevLen = 0, cpmTmr = null;

function initGame() {
  score=0; lives=3; level=1; combo=0; maxCombo=0;
  running=false; words=[]; uid=0; spawnTmr=null; rafId=null;
  typingStart=0; totalKeys=0; prevLen=0;
}
initGame();

function calcLevel() {
  var l = 1;
  for (var i = THRESH.length-1; i >= 0; i--) {
    if (score >= THRESH[i]) { l = i+1; break; }
  }
  return Math.min(l, 6);
}
function getCPM() {
  if (!typingStart) return 0;
  var mins = (Date.now()-typingStart)/60000;
  return mins < 0.02 ? 0 : Math.round(totalKeys/mins);
}

// ── 스폰 / 틱 ────────────────────────────────────────────────
function spawn() {
  if (!running) return;
  var pool = getPool(level, gameMode);
  var word = pool[Math.floor(Math.random()*pool.length)];
  var chars = Array.from(word);
  var box = sylSize[0];
  var bw = chars.length*(box+3);
  var x = 4 + Math.random()*Math.max(0, ga.clientWidth-bw-8);
  var el = document.createElement('div');
  el.className = 'wb'; el.style.left = x+'px';
  chars.forEach(function(ch){
    var s = document.createElement('div');
    s.className = 'sy'; s.textContent = ch;
    el.appendChild(s);
  });
  ga.appendChild(el);
  words.push({el:el, word:word, y:-(box+10)});
}

function tick() {
  if (!running) return;
  var H = ga.clientHeight;
  var mult = gameMode==='sentence' ? 0.55 : 1;
  var spd = (SPEED[level-1]||0.7) * mult;
  var box = sylSize[0];
  var dead = [];
  words.forEach(function(w){
    w.y += spd;
    w.el.style.transform = 'translateY('+w.y+'px)';
    if (w.y+box >= H) dead.push(w);
  });
  dead.forEach(function(w){ killWord(w, false); miss(); });
  rafId = requestAnimationFrame(tick);
}

function killWord(w, ok) {
  var i = words.indexOf(w);
  if (i >= 0) words.splice(i, 1);
  if (ok) { w.el.classList.add('pop'); setTimeout(function(){ w.el.remove(); }, 320); }
  else w.el.remove();
}

function miss() {
  combo = 0; lives = Math.max(0, lives-1);
  playMiss(); doFlash('miss'); vib([50,20,50]);
  updateHUD(); refreshCombo();
  ga.classList.remove('shake'); void ga.offsetWidth; ga.classList.add('shake');
  setTimeout(function(){ ga.classList.remove('shake'); }, 320);
  if (lives <= 0) gameOver();
}

// ── 입력 ──────────────────────────────────────────────────────
var inp = document.getElementById('inp');

function submitInput() {
  if (!running) return;
  var v = inp.value.trim();
  if (!v) return;
  checkMatch(v);
  // 문장 모드 or 단어 모드 실패 시 클리어
  if (inp.value) { inp.value=''; prevLen=0; highlight(''); }
}

inp.addEventListener('input', function(){
  var v = this.value;
  if (running) {
    if (!typingStart && v.length > 0) typingStart = Date.now();
    if (v.length > prevLen) totalKeys += v.length - prevLen;
    prevLen = v.length;
  }
  highlight(v);
  if (gameMode === 'word') checkMatch(v);
});

inp.addEventListener('keydown', function(e){
  if (e.key === 'Enter' || e.keyCode === 13) {
    e.preventDefault();
    submitInput();
  }
});
inp.addEventListener('keyup', function(e){
  if (e.key === 'Enter' || e.keyCode === 13) { submitInput(); }
});
document.getElementById('sub-btn').addEventListener('click', function(){
  submitInput(); inp.focus();
});

function highlight(typed) {
  words.forEach(function(w){
    var syls = w.el.querySelectorAll('.sy');
    var wc = Array.from(w.word);
    var m = 0;
    for (var i = 0; i < Math.min(typed.length, wc.length); i++) {
      if (typed[i] === wc[i]) m++; else break;
    }
    syls.forEach(function(s,i){ s.classList.toggle('ok', i < m); });
  });
}

function checkMatch(typed) {
  if (!typed || !running) return;
  var hit = null;
  words.forEach(function(w){
    if (w.word === typed && (!hit || w.y > hit.y)) hit = w;
  });
  if (hit) { onHit(hit); inp.value=''; prevLen=0; highlight(''); }
}

function onHit(w) {
  combo++; maxCombo = Math.max(maxCombo, combo);
  var base = level<=2?10:level<=4?16:level<=5?24:36;
  var bon = 1 + Math.floor(combo/3)*0.5;
  var gained = Math.round(base * Array.from(w.word).length * bon);
  score += gained;
  if (combo>=3) playCombo(combo); else playHit(combo);
  doFlash(combo>=3?'combo':'hit');
  vib(combo>=5?[8,4,8,4,8]:combo>=3?[8,4,8]:[6]);
  burst(w.el, combo); scorePopup(w.el, gained, combo);
  killWord(w, true);
  var prev = level; level = calcLevel();
  if (level > prev) { playLvUp(); lvUpFX(); }
  updateHUD(); refreshCombo();
}

// ── 파티클 ────────────────────────────────────────────────────
function burst(el, c) {
  var ar = ga.getBoundingClientRect(), r = el.getBoundingClientRect();
  var cx = r.left+r.width/2-ar.left, cy = r.top+r.height/2-ar.top;
  var cols = ['#34d399','#f87171','#fbbf24','#a78bfa','#60a5fa','#fb923c'];
  var rc = c>=5?'#a78bfa':c>=3?'#fbbf24':'#34d399';
  var cnt = c>=5?18:c>=3?12:8;
  var ring = document.createElement('div'); ring.className='ring';
  var sz = (r.width+r.height)*2.4;
  ring.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+cx+'px;top:'+cy+'px;--rc:'+rc+';z-index:40;';
  ga.appendChild(ring); setTimeout(function(){ ring.remove(); }, 400);
  for (var i=0; i<cnt; i++) {
    var p = document.createElement('div'); p.className='pt';
    var a = (i/cnt)*Math.PI*2, d = 22+Math.random()*50*(c>=3?1.5:1), s2=3+Math.random()*5;
    p.style.cssText='width:'+s2+'px;height:'+s2+'px;left:'+cx+'px;top:'+cy+'px;background:'+cols[i%cols.length]+';--tx:'+Math.round(Math.cos(a)*d)+'px;--ty:'+Math.round(Math.sin(a)*d)+'px;z-index:40;';
    ga.appendChild(p); setTimeout(function(){ p.remove(); }, 650);
  }
}
function scorePopup(el, pts, c) {
  var ar=ga.getBoundingClientRect(), r=el.getBoundingClientRect();
  var sp=document.createElement('div'); sp.className='sc-pop';
  sp.textContent = c>=3?'+'+pts+' 🔥':'+'+pts;
  var clr=c>=5?'#a78bfa':c>=3?'#fbbf24':'#34d399';
  var fs=c>=5?'18px':c>=3?'15px':'13px';
  sp.style.cssText='left:'+(r.left+r.width/2-ar.left)+'px;top:'+(r.top-ar.top)+'px;font-size:'+fs+';color:'+clr+';';
  ga.appendChild(sp); setTimeout(function(){ sp.remove(); }, 720);
}

// ── HUD / 콤보 / 레벨업 ───────────────────────────────────────
function updateHUD() {
  document.getElementById('hv-score').textContent = score;
  document.getElementById('hv-level').textContent = level;
  document.getElementById('hv-lives').textContent = '♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
  document.getElementById('lvbadge').textContent = LV_LABELS[level]||'';
  var c = getCPM();
  document.getElementById('hv-cpm').textContent = c>0?c:'-';
}
var cTmr=null;
function refreshCombo() {
  var el=document.getElementById('combo'); clearTimeout(cTmr);
  if (combo>=3) { el.textContent='🔥 '+combo+'콤보!'; el.classList.add('on'); cTmr=setTimeout(function(){ el.classList.remove('on'); },1500); }
  else el.classList.remove('on');
}
function lvUpFX() {
  var t=document.createElement('div'); t.className='lv-pop';
  t.textContent='LEVEL '+level+' · '+LV_LABELS[level];
  ga.appendChild(t); setTimeout(function(){ t.remove(); },1050);
  clearInterval(spawnTmr);
  var ivls = gameMode==='sentence'?IVLS_S:IVLS;
  spawnTmr = setInterval(spawn, ivls[level-1]||ivls[0]);
}

// ── 게임 시작 / 종료 ─────────────────────────────────────────
function startGame() {
  getCtx();
  playerName = (document.getElementById('name-inp').value.trim())||'익명';
  initGame(); running=true;
  ga.querySelectorAll('.wb').forEach(function(el){ el.remove(); });
  showOv(null);
  inp.value=''; updateHUD(); refreshCombo();
  setTimeout(function(){ inp.focus(); }, 80);
  spawn();
  var ivls = gameMode==='sentence'?IVLS_S:IVLS;
  spawnTmr = setInterval(spawn, ivls[0]);
  rafId = requestAnimationFrame(tick);
  clearInterval(cpmTmr);
  cpmTmr = setInterval(function(){
    var c=getCPM(); document.getElementById('hv-cpm').textContent=c>0?c:'-';
  }, 800);
}

function gameOver() {
  running=false; clearInterval(spawnTmr); cancelAnimationFrame(rafId); clearInterval(cpmTmr);
  var cpm = getCPM();
  document.getElementById('r-name').textContent = playerName;
  document.getElementById('r-mode').textContent = gameMode==='sentence'?'📖 문장 연습':'📝 단어 연습';
  document.getElementById('r-score').textContent = score.toLocaleString();
  document.getElementById('r-cpm').textContent = cpm+' 타/분';
  document.getElementById('r-level').textContent = level+'단계 ('+LV_LABELS[level]+')';
  document.getElementById('r-combo').textContent = maxCombo+'콤보';
  lastEntry = {name:playerName,mode:gameMode,score:score,cpm:cpm,level:level,combo:maxCombo,ts:Date.now()};
  saveRank(lastEntry);
  showOv('ov-over');
}

// ── 버튼 이벤트 ───────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-again').addEventListener('click', function(){ showOv('ov-start'); });
document.getElementById('btn-rank').addEventListener('click', function(){ renderRanks(null); showOv('ov-rank'); });
document.getElementById('btn-torank').addEventListener('click', function(){ renderRanks(lastEntry); showOv('ov-rank'); });
document.getElementById('btn-back').addEventListener('click', function(){ showOv('ov-start'); });

document.querySelectorAll('.mode-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('on'); });
    this.classList.add('on');
    gameMode = this.dataset.mode;
    document.getElementById('mode-desc').textContent =
      gameMode==='sentence'?'긴 문장을 엔터로 제출해요':'짧은 단어를 빠르게 입력해요';
  });
});

})(); // end IIFE
</script>
